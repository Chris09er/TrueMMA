name: Sync balldontlie (live event)

on:
  schedule:
    # Requests every 5 minutes; cheap, because sync-live-event.ts exits
    # immediately (zero balldontlie API calls) unless an event is actually
    # happening right now.
    #
    # BUT: GitHub does not come close to honoring this. Measured over
    # 2026-07-18/19, the actual gap between delivered runs was 45-75 min,
    # with gaps up to 3.7 h — GitHub aggressively sheds high-frequency
    # `schedule` triggers on public repos, and there is no setting that
    # changes this. Do not read this cron as a delivered interval; it is a
    # request for "as often as you'll give us", which is why it stays at */5
    # rather than being lowered to a number that merely looks honest.
    #
    # Nothing latency-critical depends on this any more: the league-start
    # push moved into the database (pg_cron, see
    # supabase/migrations/006_league_start_push_pg_cron.sql) precisely
    # because of the delivery gaps above. What remains here is fight-data
    # refresh during a live card, where ~hourly is acceptable.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

# Runs are ~30 s, but GitHub can deliver several deferred schedule triggers
# back to back after a quiet period; don't let those stack up.
concurrency:
  group: sync-balldontlie-live
  cancel-in-progress: false

jobs:
  sync-production:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run sync:live
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  sync-stage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: stage
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run sync:live
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
